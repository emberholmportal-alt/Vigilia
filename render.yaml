# Blueprint de Render para Velgrim: PostgreSQL + servidor (web service) + cliente (static site).
# Deploy: en Render -> New + -> Blueprint -> elegí este repo. Render crea las 3 cosas.
#
# IMPORTANTE — este archivo NO está sincronizado con el deploy vivo (Render sólo lo lee al aplicar
# un Blueprint). Se mantiene en línea con producción para que un re-provisionamiento no rompa nada:
#   · El nombre del server define su hostname; DEBE coincidir con VITE_WS_URL del cliente (que se
#     hornea en el build). Si cambiás uno, cambiá el otro.
#   · Los planes reflejan producción: server y base en Starter (pagos: no duermen ni expiran).
databases:
  - name: velgrim-db
    databaseName: velgrim
    plan: starter   # pago: no expira (a diferencia de free, que borra la base a los ~90 días)

services:
  # --- Servidor autoritativo (WebSocket + HTTP) ---
  # El nombre genera el hostname velgrim-static.onrender.com, que es al que apunta VITE_WS_URL.
  - type: web
    name: velgrim-static
    runtime: node
    plan: starter          # Starter = no duerme (cold starts romperían las conexiones WS)
    buildCommand: npm install
    startCommand: npm run server
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: velgrim-db
          property: connectionString
      - key: NODE_VERSION
        value: "22"

  # --- Cliente (sitio estático de Vite) ---
  - type: web
    name: vigilia
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # URL WSS del web service del server. DEBE coincidir con el `name` del server de arriba
      # (velgrim-static -> wss://velgrim-static.onrender.com). Se hornea en el build de Vite.
      - key: VITE_WS_URL
        value: wss://velgrim-static.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
